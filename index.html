<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galeria zdjęć</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Galeria zdjęć</h1>
      <p class="description">
        Dodaj pliki do katalogu <code>/photos</code>, a następnie wpisz ich nazwy w
        <code>gallery.js</code>.
      </p>

      <section id="gallery" class="gallery" aria-label="Galeria zdjęć"></section>
      <p id="empty-state" class="empty-state" hidden>
        Brak zdjęć do wyświetlenia. Dodaj pliki do katalogu <code>/photos</code> i
        uzupełnij listę w <code>gallery.js</code>.
      </p>
    </main>

    <script src="gallery.js"></script>
  </body>
</html>
